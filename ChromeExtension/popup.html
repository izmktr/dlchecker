<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DlChecker</title>
    <style>
      body {
        font-family: "Yu Gothic UI", sans-serif;
        min-width: 360px;
        margin: 12px;
        color: #202124;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .controls {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .query-input {
        flex: 1 1 220px;
        min-width: 180px;
        border: 1px solid #d2d5da;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 13px;
      }

      button {
        border: 1px solid #0a63c9;
        background: #0a63c9;
        color: #fff;
        border-radius: 6px;
        padding: 8px 12px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: default;
      }

      #status {
        margin-bottom: 8px;
        font-size: 12px;
      }

      #result {
        border: 1px solid #d2d5da;
        border-radius: 8px;
        padding: 8px;
        background: #f8f9fb;
        max-height: 280px;
        overflow: auto;
      }

      .small {
        font-size: 12px;
        line-height: 1.5;
        color: #444;
      }

      .list {
        margin: 8px 0 0;
        padding-left: 18px;
      }

      .item {
        margin-bottom: 6px;
      }

      .match-highlight {
        background: #ffeb3b;
        color: #202124;
        padding: 0 2px;
        border-radius: 2px;
      }

      a {
        color: #0a63c9;
      }
    </style>
  </head>
  <body>
    <h1>DlChecker</h1>
    <div class="controls">
      <input id="query" class="query-input" type="text" placeholder="任意の検索文字列" />
      <button id="run">現在タブで照合</button>
      <a href="options.html" target="_blank">設定</a>
    </div>
    <div id="status" class="small">待機中</div>
    <div id="result" class="small">まだ実行していません。</div>

    <script src="popup.js"></script>
  </body>
</html>
