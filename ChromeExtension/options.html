<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DlChecker Options</title>
    <style>
      body {
        font-family: "Yu Gothic UI", sans-serif;
        margin: 20px;
        line-height: 1.5;
      }
      label {
        display: block;
        margin-bottom: 6px;
      }
      input[type="text"] {
        width: min(560px, 100%);
        padding: 8px;
      }
      input[type="number"] {
        width: 120px;
        padding: 8px;
      }
      textarea {
        width: min(720px, 100%);
        min-height: 140px;
        padding: 8px;
        font-family: Consolas, "Yu Gothic UI", sans-serif;
        line-height: 1.4;
      }
      button {
        margin-top: 14px;
        padding: 8px 14px;
      }
      #status {
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1>DlChecker 設定</h1>

    <label>
      <input id="enabled" type="checkbox" /> 連携を有効化
    </label>

    <label for="endpoint">送信先エンドポイント</label>
    <input id="endpoint" type="text" placeholder="http://127.0.0.1:48762/ingest" />

    <label for="threshold">一致しきい値 (0-100)</label>
    <input id="threshold" type="number" min="0" max="100" step="1" />

    <label for="targetUrls">自動照合ルール (改行区切り)</label>
    <textarea
      id="targetUrls"
      placeholder="https://example.com/downloads\nhttps://files.example.net/* | [SubsPlease], 1080p"
    ></textarea>
    <div style="max-width: 720px; font-size: 12px; color: #555; margin-top: 4px;">
      形式: URLパターン | 削除文字列1, 削除文字列2。<br />
      例: https://files.example.net/* | [SubsPlease], 1080p<br />
      URLのみの行は従来どおり利用できます。
    </div>

    <div>
      <button id="save">保存</button>
    </div>
    <div id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
